<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FY26 各部門費用差異儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --cream:#FBF1D7;--peach:#FAD6B5;--pink:#FAADAC;--lav:#FCDFE5;
  --mint:#DAF1EE;--teal:#B6E3E7;
  --red:#DC2626;--red-bg:#FEF2F2;
  --grn:#059669;--grn-bg:#F0FDF4;
  --amb:#D97706;--amb-bg:#FFFBEB;
  --blu:#2563EB;--blu-bg:#EFF6FF;
  --gray:#6B7280;--dark:#111827;--border:#E5E7EB;
  --sh:0 1px 3px rgba(0,0,0,.08);--shm:0 4px 16px rgba(0,0,0,.1);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;
  background:#F3F4F6;color:var(--dark);font-size:13px;}

/* Header */
.hdr{background:linear-gradient(135deg,var(--pink),var(--peach) 55%,var(--cream));
  padding:18px 28px 14px;border-bottom:1px solid var(--border);}
.hdr h1{font-size:19px;font-weight:700;letter-spacing:.3px;}
.hdr p{font-size:11px;color:#7C5C52;margin-top:3px;}
.hdr-row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;align-items:center;}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;
  font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid;transition:all .18s;}
.btn-upload{background:#fff;border-color:var(--pink);color:#B91C1C;}
.btn-upload:hover{background:var(--pink);color:#fff;}
.btn-export{background:#fff;border-color:var(--teal);color:#0D6E6E;}
.btn-export:hover{background:var(--teal);color:#fff;}
.status{font-size:11px;color:#6B5B50;background:rgba(255,255,255,.55);
  padding:3px 10px;border-radius:6px;}
#fileInput{display:none;}

/* Tabs */
.tabs{display:flex;background:#fff;border-bottom:2px solid var(--border);padding:0 24px;overflow-x:auto;}
.tab{padding:11px 18px;cursor:pointer;font-size:12px;font-weight:600;color:var(--gray);
  border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;transition:all .18s;}
.tab:hover{color:var(--dark);}
.tab.on{color:#B91C1C;border-bottom-color:var(--pink);}

/* Content */
.page{padding:18px 22px;max-width:1360px;margin:0 auto;}
.panel{display:none;}.panel.on{display:block;}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:18px;}
.kpi{background:#fff;border-radius:12px;padding:14px 16px;box-shadow:var(--sh);border-left:4px solid var(--teal);}
.kpi.r{border-left-color:var(--red);}
.kpi.g{border-left-color:var(--grn);}
.kpi.p{border-left-color:var(--peach);}
.kpi-lbl{font-size:10px;color:var(--gray);font-weight:500;margin-bottom:5px;}
.kpi-val{font-size:22px;font-weight:700;line-height:1.1;}
.kpi-val.r{color:var(--red);}.kpi-val.g{color:var(--grn);}
.kpi-sub{font-size:10px;color:var(--gray);margin-top:3px;}

/* Section */
.sec{font-size:12px;font-weight:700;color:var(--dark);
  margin:18px 0 9px;padding-bottom:5px;border-bottom:2px solid var(--mint);}

/* Chart */
.card{background:#fff;border-radius:12px;padding:16px;box-shadow:var(--sh);margin-bottom:18px;}
.bar-row{display:grid;grid-template-columns:150px 1fr 80px;gap:8px;align-items:center;margin-bottom:5px;}
.bar-lbl{font-size:11px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{background:var(--border);border-radius:4px;height:16px;}
.bar-fill{height:100%;border-radius:4px;transition:width .5s;}
.bar-fill.r{background:linear-gradient(90deg,#FCA5A5,var(--red));}
.bar-fill.g{background:linear-gradient(90deg,#6EE7B7,var(--grn));}
.bar-num{font-size:11px;font-weight:600;text-align:right;}
.bar-num.r{color:var(--red);}.bar-num.g{color:var(--grn);}

/* Table */
.tbl-wrap{background:#fff;border-radius:12px;box-shadow:var(--sh);overflow:hidden;margin-bottom:18px;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{background:var(--mint);font-weight:700;padding:8px 9px;text-align:center;
  border-bottom:2px solid var(--teal);white-space:nowrap;}
td{padding:7px 9px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:nth-child(even) td{background:#FAFAFA;}
tr:hover td{background:var(--cream);}
tr.tot td{background:var(--teal)!important;font-weight:700;}
.r{color:var(--red);font-weight:600;}.g{color:var(--grn);font-weight:600;}
.dept{font-weight:600;white-space:nowrap;}
.na{color:#9CA3AF;font-size:10px;}
.fy-y{background:var(--mint);color:#065F46;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600;}
.fy-n{background:#F3F4F6;color:var(--gray);padding:1px 6px;border-radius:4px;font-size:10px;}

/* Filter bar */
.fbar{display:flex;gap:12px;align-items:flex-end;margin-bottom:14px;flex-wrap:wrap;}
.fg{display:flex;flex-direction:column;gap:3px;}
.flbl{font-size:10px;color:var(--gray);font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
select{border:1.5px solid var(--border);border-radius:7px;padding:6px 10px;
  font-size:12px;background:#fff;cursor:pointer;outline:none;}
select:focus{border-color:var(--pink);}
.tgl{display:flex;border:1.5px solid var(--border);border-radius:7px;overflow:hidden;}
.tgl-btn{padding:5px 12px;font-size:11px;font-weight:600;cursor:pointer;
  background:#fff;color:var(--gray);border:none;transition:all .15s;}
.tgl-btn.on{background:var(--pink);color:#fff;}

/* Dropdown */
.dd-wrap{position:relative;}
.dd-btn{border:1.5px solid var(--border);border-radius:7px;padding:6px 12px;
  font-size:12px;background:#fff;cursor:pointer;color:var(--dark);white-space:nowrap;}
.dd-panel{display:none;position:absolute;top:calc(100% + 4px);left:0;background:#fff;
  border:1.5px solid var(--border);border-radius:8px;box-shadow:var(--shm);
  z-index:100;min-width:200px;max-height:270px;overflow-y:auto;padding:4px 0;}
.dd-panel.on{display:block;}
.dd-item{display:flex;align-items:center;gap:8px;padding:5px 12px;cursor:pointer;font-size:12px;}
.dd-item:hover{background:var(--cream);}
.dd-div{border-top:1px solid var(--border);margin:3px 0;}
.dd-all{font-weight:700;color:#B91C1C;}

/* Dept cards */
.dept-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:12px;}
.dc{background:#fff;border-radius:10px;box-shadow:var(--sh);overflow:hidden;}
.dc-head{padding:9px 13px;background:linear-gradient(90deg,var(--mint),var(--cream));
  display:flex;justify-content:space-between;align-items:center;}
.dc-name{font-size:12px;font-weight:700;}
.dc-diff{font-size:13px;font-weight:700;}
.dc-body{padding:9px 13px;}
.ei{border-bottom:1px solid var(--border);padding:7px 0;}
.ei:last-child{border-bottom:none;}
.ei-subj{font-size:11px;font-weight:700;margin-bottom:3px;}
.vbadge{display:inline-block;font-size:9px;font-weight:600;padding:1px 5px;
  background:var(--teal);color:#065F46;border-radius:3px;margin-left:4px;}
.ei-txt{font-size:11px;color:#374151;line-height:1.6;white-space:pre-wrap;}

/* Alert cards */
.ac-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;}
.ac{background:#fff;border-radius:10px;padding:13px 15px;box-shadow:var(--sh);border-left:4px solid var(--border);}
.ac.h{border-left-color:var(--red);}
.ac.m{border-left-color:var(--amb);}
.ac.g{border-left-color:var(--grn);}
.ac.n{border-left-color:var(--blu);}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;margin-bottom:7px;}
.bh{background:var(--red-bg);color:var(--red);}
.bm{background:var(--amb-bg);color:var(--amb);}
.bg{background:var(--grn-bg);color:var(--grn);}
.bn{background:var(--blu-bg);color:var(--blu);}
.ac-title{font-size:12px;font-weight:700;margin-bottom:7px;line-height:1.4;}
.ac-desc{font-size:11px;color:#4B5563;line-height:1.6;margin-bottom:7px;}
.ac-act{font-size:11px;color:var(--blu);background:var(--blu-bg);padding:5px 9px;border-radius:6px;}

/* Trend */
.trend-ph{text-align:center;padding:36px;color:var(--gray);font-size:12px;line-height:1.8;}
.mpill{display:inline-flex;gap:6px;flex-wrap:wrap;}
.mp{padding:4px 13px;border-radius:99px;font-size:11px;font-weight:600;
  border:1.5px solid var(--border);cursor:pointer;background:#fff;color:var(--gray);transition:all .15s;}
.mp.on{background:var(--pink);border-color:var(--pink);color:#fff;}

@media(max-width:600px){.kpi-row{grid-template-columns:1fr 1fr;}.bar-row{grid-template-columns:100px 1fr 65px;}.page{padding:10px;}}
</style>
</head>
<body>

<div class="hdr">
  <h1>📊 FY26 各部門費用差異儀表板</h1>
  <p>倍樂生台北分公司 ｜ 業績分析與企劃支援部門 ｜ 預算基準：FY26期初目標</p>
  <div class="hdr-row">
    <label class="btn btn-upload">⬆ 上傳彙整Excel<input type="file" id="fileInput" accept=".xlsx,.xls"></label>
    <button class="btn btn-export" onclick="exportExcel()">⬇ 匯出目前資料</button>
    <span class="status" id="dataStatus">目前資料：202604（內嵌）</span>
  </div>
</div>

<div class="tabs">
  <div class="tab on" onclick="switchTab('ov')">📈 全公司總覽</div>
  <div class="tab" onclick="switchTab('tr')">📅 月份趨勢</div>
  <div class="tab" onclick="switchTab('dp')">🏢 部門明細</div>
  <div class="tab" onclick="switchTab('an')">🔍 財務分析</div>
</div>

<div class="page">

<!-- Tab1 總覽 -->
<div class="panel on" id="p-ov">
  <div class="kpi-row" id="kpiRow"></div>
  <div class="sec">📊 各部門當月差異（依絕對值排序）</div>
  <div class="card" id="barChart"></div>
  <div class="sec">📋 部門差異總覽表</div>
  <div class="tbl-wrap"><table><thead><tr>
    <th>部門</th><th>當月差異</th><th>狀態</th>
    <th>全年預算</th><th>全年預估</th><th>全年差異</th><th>全年狀態</th><th>全年資料</th>
  </tr></thead><tbody id="ovTbody"></tbody></table></div>
</div>

<!-- Tab2 趨勢 -->
<div class="panel" id="p-tr">
  <div class="sec">📅 月份選擇</div>
  <div class="mpill" id="mPills"></div>
  <div class="sec" style="margin-top:16px">📊 全公司當月差異走勢</div>
  <div class="card" id="trendSvg"></div>
  <div class="sec">📋 跨月差異比較</div>
  <div class="tbl-wrap"><table><thead><tr id="trendHdr"></tr></thead><tbody id="trendBody"></tbody></table></div>
</div>

<!-- Tab3 部門 -->
<div class="panel" id="p-dp">
  <div class="fbar">
    <div class="fg"><span class="flbl">月份</span><select id="dpMon" onchange="renderDept()"></select></div>
    <div class="fg">
      <span class="flbl">部門（複選）</span>
      <div class="dd-wrap">
        <button class="dd-btn" id="ddBtn" onclick="toggleDD(event)">全部部門 ▾</button>
        <div class="dd-panel" id="ddPanel">
          <div class="dd-item dd-all"><input type="checkbox" id="chkAll" checked onchange="chkAllDepts(this.checked)"><label for="chkAll">全選</label></div>
          <div class="dd-div"></div>
          <div id="deptChks"></div>
        </div>
      </div>
    </div>
    <div class="fg"><span class="flbl">觀點</span>
      <div class="tgl">
        <button class="tgl-btn on" id="vCurr" onclick="setView('curr')">當月</button>
        <button class="tgl-btn" id="vCum"  onclick="setView('cum')">累計</button>
        <button class="tgl-btn" id="vFy"   onclick="setView('fy')">全年</button>
      </div>
    </div>
  </div>
  <div class="tbl-wrap"><table><thead><tr id="dpHdr"></tr></thead><tbody id="dpBody"></tbody></table></div>
  <div class="sec">📝 差異說明</div>
  <div class="dept-grid" id="dpCards"></div>
</div>

<!-- Tab4 分析 -->
<div class="panel" id="p-an">
  <div class="fbar">
    <div class="fg"><span class="flbl">月份</span><select id="anMon" onchange="renderAn()"></select></div>
    <div class="fg"><span class="flbl">等級</span>
      <div class="tgl">
        <button class="tgl-btn on" id="lvAll"  onclick="setLv('all')">全部</button>
        <button class="tgl-btn"    id="lvHigh" onclick="setLv('高風險')">🔴 高風險</button>
        <button class="tgl-btn"    id="lvMid"  onclick="setLv('中風險')">🟡 中風險</button>
        <button class="tgl-btn"    id="lvGood" onclick="setLv('正向訊號')">🟢 正向</button>
        <button class="tgl-btn"    id="lvNote" onclick="setLv('格式建議')">📋 建議</button>
      </div>
    </div>
  </div>
  <div class="ac-grid" id="anGrid"></div>
</div>

</div><!-- /page -->

const fmt = (v,w=true) => {
  if(v===null||v===undefined||v==='') return '—';
  const n=Math.round(Number(v)), a=Math.abs(n);
  const s=n>=0?(w?'+':''):'-';
  if(a>=10000) return s+Math.round(a/1000)/10+'萬';
  return s+a.toLocaleString();
};
const fmtAbs = v => v===null||v===undefined?'—':Math.round(Number(v)).toLocaleString();
const fmtRate = v => {
  if(v===null||v===undefined||v==='') return '—';
  const p=((Number(v)-1)*100).toFixed(1);
  return (p>0?'+':'')+p+'%';
};
const ymFmt = v => v?String(v).slice(0,4)+'/'+String(v).slice(4,6):'';
const dc = v => Number(v)>0?'r':Number(v)<0?'g':'';
const st = v => Number(v)>0?'▲超支':Number(v)<0?'▼節省':'─持平';

// ──────────────────────────────────────
// Tab 切換
// ──────────────────────────────────────
const TABS=[['ov','p-ov'],['tr','p-tr'],['dp','p-dp'],['an','p-an']];
function switchTab(id){
  // Tab 按鈕
  document.querySelectorAll('.tabs .tab').forEach((t,i)=>{
    t.classList.toggle('on', TABS[i][0]===id);
  });
  // 只切換4個主 panel（用ID精準選取，不影響下拉面板）
  ['p-ov','p-tr','p-dp','p-an'].forEach(pid=>{
    const el=document.getElementById(pid);
    if(el) el.classList.toggle('on', pid==='p-'+id);
  });
}

// ──────────────────────────────────────
// Tab1: 總覽
// ──────────────────────────────────────
function renderOv(){
  const months=[...new Set(DATA.overview.map(r=>r['年月']))].sort();
  const ym=months[months.length-1];
  const rows=DATA.overview.filter(r=>r['年月']===ym);
  const tMon=rows.reduce((s,r)=>s+(Number(r['當月差異'])||0),0);
  const fyR=rows.filter(r=>r['有無全年資料']==='Y');
  const tFy=fyR.reduce((s,r)=>s+(Number(r['全年差異'])||0),0);
  const wCnt=rows.filter(r=>Number(r['當月差異'])>0).length;
  const sCnt=rows.filter(r=>Number(r['當月差異'])<0).length;

  document.getElementById('kpiRow').innerHTML=`
    <div class="kpi ${tMon>0?'r':'g'}">
      <div class="kpi-lbl">全公司當月差異（${ymFmt(ym)}）</div>
      <div class="kpi-val ${tMon>0?'r':'g'}">${fmt(tMon)}</div>
      <div class="kpi-sub">${st(tMon)} ${rows.length}個部門</div>
    </div>
    <div class="kpi ${tFy>0?'r':'g'}">
      <div class="kpi-lbl">全公司全年差異（${fyR.length}部門）</div>
      <div class="kpi-val ${tFy>0?'r':'g'}">${fmt(tFy)}</div>
      <div class="kpi-sub">※ 不含無全年資料部門</div>
    </div>
    <div class="kpi r">
      <div class="kpi-lbl">超支部門數</div>
      <div class="kpi-val r">${wCnt}</div>
      <div class="kpi-sub">當月費用超出預算</div>
    </div>
    <div class="kpi g">
      <div class="kpi-lbl">節省部門數</div>
      <div class="kpi-val g">${sCnt}</div>
      <div class="kpi-sub">當月費用低於預算</div>
    </div>`;

  const sorted=[...rows].sort((a,b)=>Math.abs(Number(b['當月差異'])||0)-Math.abs(Number(a['當月差異'])||0));
  const mx=Math.max(...sorted.map(r=>Math.abs(Number(r['當月差異'])||0)),1);
  document.getElementById('barChart').innerHTML=sorted.map(r=>{
    const v=Number(r['當月差異'])||0;
    const pct=Math.abs(v)/mx*92;
    const cls=v>=0?'r':'g';
    return `<div class="bar-row">
      <div class="bar-lbl" title="${r['部門']}">${r['部門']}</div>
      <div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>
      <div class="bar-num ${cls}">${fmt(v)}</div>
    </div>`;
  }).join('');

  const tFyBud=fyR.reduce((s,r)=>s+(Number(r['全年預算'])||0),0);
  const tFyEst=fyR.reduce((s,r)=>s+(Number(r['全年預估'])||0),0);
  const tbRows=rows.map(r=>{
    const m=Number(r['當月差異'])||0, f=r['全年差異']!==null&&r['全年差異']!==''?Number(r['全年差異']):null;
    return `<tr>
      <td class="dept">${r['部門']}</td>
      <td class="${dc(m)}">${fmt(m)}</td><td class="${dc(m)}">${st(m)}</td>
      <td>${r['全年預算']?fmtAbs(r['全年預算']):'—'}</td>
      <td>${r['全年預估']?fmtAbs(r['全年預估']):'—'}</td>
      <td class="${f!==null?dc(f):''}">${f!==null?fmt(f):'—'}</td>
      <td class="${f!==null?dc(f):''}">${f!==null?st(f):'—'}</td>
      <td><span class="${r['有無全年資料']==='Y'?'fy-y':'fy-n'}">${r['有無全年資料']}</span></td>
    </tr>`;
  }).join('');
  document.getElementById('ovTbody').innerHTML=tbRows+`<tr class="tot">
    <td>全公司合計</td>
    <td class="${dc(tMon)}">${fmt(tMon)}</td><td>${st(tMon)}</td>
    <td>${fmtAbs(tFyBud)}</td><td>${fmtAbs(tFyEst)}</td>
    <td class="${dc(tFy)}">${fmt(tFy)}</td><td>${st(tFy)}</td>
    <td style="font-size:10px;color:#555">含${fyR.length}部門</td>
  </tr>`;
}

// ──────────────────────────────────────
// Tab2: 趨勢
// ──────────────────────────────────────
function renderTr(){
  const months=[...new Set(DATA.overview.map(r=>r['年月']))].sort();
  document.getElementById('mPills').innerHTML=months.map(m=>
    `<span class="mp on" data-m="${m}" onclick="this.classList.toggle('on');renderTrTable()">${ymFmt(m)}</span>`
  ).join('');

  if(months.length===1){
    document.getElementById('trendSvg').innerHTML=`<div class="trend-ph">📅 目前只有 ${ymFmt(months[0])} 一個月資料。<br>上傳5月彙整Excel後，此處自動顯示跨月趨勢圖。</div>`;
  } else {
    const totals=months.map(m=>DATA.overview.filter(r=>r['年月']===m).reduce((s,r)=>s+(Number(r['當月差異'])||0),0));
    const mx=Math.max(...totals.map(Math.abs),1);
    const W=600,H=200,PX=50,PY=20,BW=Math.min(55,Math.floor((W-PX*2)/months.length*0.55));
    const cx=i=>PX+(W-PX*2)*i/(months.length-1||1);
    const cy=v=>H/2-(v/mx)*(H/2-PY);
    const bars=totals.map((v,i)=>{
      const x=cx(i)-BW/2,y0=H/2,h=Math.abs(cy(v)-H/2),y=v>=0?cy(v):y0;
      return `<rect x="${x}" y="${y}" width="${BW}" height="${h}" fill="${v>=0?'#EF4444':'#10B981'}" rx="3" opacity=".85"/>
        <text x="${cx(i)}" y="${v>=0?cy(v)-5:cy(v)+14}" text-anchor="middle" font-size="10" fill="${v>=0?'#DC2626':'#059669'}">${fmt(v)}</text>
        <text x="${cx(i)}" y="${H-6}" text-anchor="middle" font-size="10" fill="#6B7280">${ymFmt(months[i])}</text>`;
    }).join('');
    document.getElementById('trendSvg').innerHTML=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;height:${H}px">
      <line x1="${PX}" y1="${H/2}" x2="${W-PX}" y2="${H/2}" stroke="#E5E7EB" stroke-width="1.5"/>
      ${bars}</svg>`;
  }
  renderTrTable();
}

function renderTrTable(){
  const active=[...document.querySelectorAll('.mp.on')].map(p=>p.dataset.m).sort();
  const depts=[...new Set(DATA.overview.map(r=>r['部門']))];
  document.getElementById('trendHdr').innerHTML='<th>部門</th>'+active.map(m=>`<th>${ymFmt(m)} 當月差異</th><th>全年差異</th>`).join('');
  const tbody=depts.map(d=>{
    const cells=active.map(m=>{
      const r=DATA.overview.find(o=>o['年月']===m&&o['部門']===d);
      if(!r) return '<td>—</td><td>—</td>';
      const md=Number(r['當月差異'])||0, fd=r['全年差異']!==null&&r['全年差異']!==''?Number(r['全年差異']):null;
      return `<td class="${dc(md)}">${fmt(md)}</td><td class="${fd!==null?dc(fd):'na'}">${fd!==null?fmt(fd):'—'}</td>`;
    }).join('');
    return `<tr><td class="dept">${d}</td>${cells}</tr>`;
  }).join('');
  const totCells=active.map(m=>{
    const rows=DATA.overview.filter(r=>r['年月']===m);
    const tm=rows.reduce((s,r)=>s+(Number(r['當月差異'])||0),0);
    const tf=rows.filter(r=>r['有無全年資料']==='Y').reduce((s,r)=>s+(Number(r['全年差異'])||0),0);
    return `<td class="${dc(tm)}" style="font-weight:700">${fmt(tm)}</td><td class="${dc(tf)}" style="font-weight:700">${fmt(tf)}*</td>`;
  }).join('');
  document.getElementById('trendBody').innerHTML=tbody+`<tr class="tot"><td>合計</td>${totCells}</tr>`;
}

// ──────────────────────────────────────
// Tab3: 部門明細
// ──────────────────────────────────────
function initDept(){
  const months=[...new Set(DATA.overview.map(r=>r['年月']))].sort();
  const sel=document.getElementById('dpMon');
  sel.innerHTML=months.map(m=>`<option value="${m}">${ymFmt(m)}</option>`).join('');
  sel.value=months[months.length-1];
  const depts=[...new Set(DATA.overview.map(r=>r['部門']))];
  depts.forEach(d=>selDepts.add(d));
  document.getElementById('deptChks').innerHTML=depts.map(d=>`
    <div class="dd-item"><input type="checkbox" id="chk_${CSS.escape(d)}" checked onchange="onDeptChk()"><label for="chk_${CSS.escape(d)}">${d}</label></div>`
  ).join('');
  renderDept();
}

function toggleDD(e){e.stopPropagation();ddOpen=!ddOpen;document.getElementById('ddPanel').classList.toggle('on',ddOpen);}
document.addEventListener('click',()=>{ddOpen=false;document.getElementById('ddPanel')?.classList.remove('on');});

function chkAllDepts(v){
  document.querySelectorAll('#deptChks input').forEach(c=>{c.checked=v;v?selDepts.add(c.id.replace('chk_','')):selDepts.delete(c.id.replace('chk_',''));});
  renderDept(); updateDDBtn();
}
function onDeptChk(){
  selDepts.clear();
  document.querySelectorAll('#deptChks input:checked').forEach(c=>selDepts.add(c.id.replace('chk_','')));
  const all=[...document.querySelectorAll('#deptChks input')].every(c=>c.checked);
  document.getElementById('chkAll').checked=all;
  updateDDBtn(); renderDept();
}
function updateDDBtn(){
  const n=selDepts.size,t=[...document.querySelectorAll('#deptChks input')].length;
  document.getElementById('ddBtn').textContent=n===t?'全部部門 ▾':`已選${n}個部門 ▾`;
}

function setView(v){
  curView=v;
  ['curr','cum','fy'].forEach(x=>document.getElementById('v'+x.charAt(0).toUpperCase()+x.slice(1))?.classList.toggle('on',x===v));
  renderDept();
}

function renderDept(){
  const ym=document.getElementById('dpMon').value;
  const vMap={
    curr:{b:'當月預算',a:'當月實績',d:'當月差異',r:'當月達成率',lbl:'當月'},
    cum: {b:'累計預算',a:'累計實績',d:'累計差異',r:'累計達成率',lbl:'累計'},
    fy:  {b:'全年預算',a:'全年預估',d:null,      r:null,         lbl:'全年'},
  };
  const vm=vMap[curView];
  document.getElementById('dpHdr').innerHTML=`<th>部門</th><th>科目</th><th>${vm.lbl}預算</th><th>${vm.lbl}實績/推估</th><th>${vm.lbl}差異</th>${vm.r?'<th>達成率</th>':''}`;

  const rows=DATA.detail.filter(r=>r['年月']===ym&&selDepts.has(r['部門']));
  const tbody=rows.map(r=>{
    const bv=r[vm.b],av=r[vm.a];
    const dv=vm.d?Number(r[vm.d]):(av!==null&&bv!==null?Number(av)-Number(bv):null);
    const rv=vm.r?r[vm.r]:null;
    if(Math.abs(dv||0)<1&&Math.abs(Number(bv)||0)<1) return '';
    return `<tr>
      <td class="dept">${r['部門']}</td><td>${r['科目']}</td>
      <td class="na">${bv!==null?fmtAbs(bv):'—'}</td>
      <td>${av!==null?fmtAbs(av):'—'}</td>
      <td class="${dc(dv)}">${dv!==null?fmt(dv):'—'}</td>
      ${vm.r?`<td>${rv!==null?fmtRate(rv):'—'}</td>`:''}
    </tr>`;
  }).join('');
  document.getElementById('dpBody').innerHTML=tbody||'<tr><td colspan="6" style="text-align:center;color:#9CA3AF;padding:16px">無資料</td></tr>';

  // 說明卡片
  const ex=DATA.explain.filter(r=>r['年月']===ym&&selDepts.has(r['部門']));
  const byD={};
  ex.forEach(r=>{
    if(!byD[r['部門']]) byD[r['部門']]={};
    if(!byD[r['部門']][r['科目']]) byD[r['部門']][r['科目']]=[];
    byD[r['部門']][r['科目']].push(r);
  });
  const ovByD={};
  DATA.overview.filter(r=>r['年月']===ym).forEach(r=>ovByD[r['部門']]=r);

  document.getElementById('dpCards').innerHTML=[...selDepts].filter(d=>byD[d]).map(dept=>{
    const ov=ovByD[dept], dv=ov?Number(ov['當月差異'])||0:0;
    const items=Object.entries(byD[dept]).map(([subj,list])=>`
      <div class="ei">
        <div class="ei-subj">${subj}</div>
        ${list.map(r=>`<span class="vbadge">${r['觀點']}</span><div class="ei-txt">${r['說明'].replace(/\n/g,'\n')}</div>`).join('')}
      </div>`).join('');
    return `<div class="dc">
      <div class="dc-head"><span class="dc-name">${dept}</span><span class="dc-diff ${dc(dv)}">${fmt(dv)}</span></div>
      <div class="dc-body">${items}</div>
    </div>`;
  }).join('')||'<p style="color:var(--gray)">請選擇部門</p>';
}

// ──────────────────────────────────────
// Tab4: 財務分析

function initAn(){
  const months=[...new Set(DATA.analysis.map(r=>r['年月']))].sort();
  const sel=document.getElementById('anMon');
  sel.innerHTML=months.map(m=>`<option value="${m}">${ymFmt(m)}</option>`).join('');

function setLv(v){
  curLv=v;
  const map={all:'lvAll','高風險':'lvHigh','中風險':'lvMid','正向訊號':'lvGood','格式建議':'lvNote'};
  Object.values(map).forEach(id=>document.getElementById(id)?.classList.remove('on'));
  document.getElementById(map[v])?.classList.add('on');
  renderAn();
}
function renderAn(){
  const ym=document.getElementById('anMon').value;
  const rows=DATA.analysis.filter(r=>r['年月']===ym&&(curLv==='all'||r['優先等級']===curLv));
  const cm={'高風險':'h','中風險':'m','正向訊號':'g','格式建議':'n'};
  const bm={'高風險':'bh','中風險':'bm','正向訊號':'bg','格式建議':'bn'};
  const im={'高風險':'🔴','中風險':'🟡','正向訊號':'🟢','格式建議':'📋'};
  document.getElementById('anGrid').innerHTML=rows.map(r=>`
    <div class="ac ${cm[r['優先等級']]||''}">
      <span class="badge ${bm[r['優先等級']]||''}">${im[r['優先等級']]||''} ${r['優先等級']}</span>
      <div class="ac-title">${r['議題']}</div>
      <div class="ac-desc">${r['分析說明']}</div>
      <div class="ac-act">💡 ${r['建議行動']}</div>
    </div>`).join('')||'<p style="color:var(--gray);padding:20px">無資料</p>';
}

// ──────────────────────────────────────
// 上傳 Excel
// ──────────────────────────────────────
document.getElementById('fileInput').addEventListener('change',function(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const wb=XLSX.read(ev.target.result,{type:'array'});
      const sheetMap={'月份總覽':'overview','科目明細':'detail','差異說明':'explain','財務分析':'analysis'};
      const newData={overview:[],detail:[],explain:[],analysis:[]};

      Object.entries(sheetMap).forEach(([sName,key])=>{
        const ws=wb.Sheets[sName]; if(!ws) return;
        // 第一列是標題，第二列是欄位名稱
        const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
        if(raw.length<2) return;
        const headers=raw[1]; // 第二列是欄位名
        for(let i=2;i<raw.length;i++){
          const row=raw[i];
          if(!row||!row[0]) continue; // 跳過空列
          const obj={};
          headers.forEach((h,j)=>{ if(h) obj[h]=row[j]!==undefined?row[j]:null; });
          newData[key].push(obj);
        }
      });

      // 合併資料（以年月為key去重）
      ['overview','detail','explain','analysis'].forEach(key=>{
        const existYMs=new Set(DATA[key].map(r=>r['年月']));
        const incoming=[...new Set(newData[key].map(r=>r['年月']))];
        incoming.forEach(ym=>{
          if(existYMs.has(ym)){
            // 更新現有月份
            DATA[key]=DATA[key].filter(r=>r['年月']!==ym);
          }
          DATA[key].push(...newData[key].filter(r=>r['年月']===ym));
        });
      });

      const months=[...new Set(DATA.overview.map(r=>r['年月']))].sort();
      document.getElementById('dataStatus').textContent='目前資料：'+months.map(ymFmt).join('、');
      renderOv(); renderTr(); initDept(); initAn();
      alert('✅ 資料載入成功！\n月份：'+[...new Set(newData.overview.map(r=>r['年月']))].map(ymFmt).join('、'));
    }catch(err){
      alert('❌ 解析失敗：'+err.message+'\n\n請確認上傳的是「FY26費用差異儀表板_固定格式.xlsx」');
    }
  };
  reader.readAsArrayBuffer(file);
  this.value='';
});

// ──────────────────────────────────────
// 匯出 Excel
// ──────────────────────────────────────
function exportExcel(){
  const wb=XLSX.utils.book_new();
  const sheetDefs=[
    {key:'overview', name:'月份總覽',  title:'FY26 月份總覽（各部門）'},
    {key:'detail',   name:'科目明細',  title:'FY26 科目明細'},
    {key:'explain',  name:'差異說明',  title:'FY26 差異說明'},
    {key:'analysis', name:'財務分析',  title:'FY26 財務分析'},
  ];
  sheetDefs.forEach(({key,name,title})=>{
    const rows=DATA[key];
    if(!rows||rows.length===0) return;
    const headers=Object.keys(rows[0]);
    const aoa=[[title,...Array(headers.length-1).fill('')], headers, ...rows.map(r=>headers.map(h=>r[h]))];
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    XLSX.utils.book_append_sheet(wb,ws,name);
  });
  const months=[...new Set(DATA.overview.map(r=>r['年月']))].sort();
  const fname=`FY26費用差異儀表板_固定格式_${months[months.length-1]}.xlsx`;
  XLSX.writeFile(wb,fname);
}

// ──────────────────────────────────────
// 初始化
// ──────────────────────────────────────
renderOv();
renderTr();
initDept();
initAn();
</script>
